<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 教練 (雲端自動化版) - Winbond Pro</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ==========================================
        // 🔑 請在此處貼上您從 Firebase 取得的 Config 金鑰
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBngso7NqaUeqTeCncDS35wJAUyo1Y3JdY",
            authDomain: "ai-coach-a187a.firebaseapp.com",
            projectId: "ai-coach-a187a",
            storageBucket: "ai-coach-a187a.firebasestorage.app",
            messagingSenderId: "1000067792431",
            appId: "1:1000067792431:web:b0a46226f68fd021da50da",
            measurementId: "G-CQSS8N3YLJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 雲端同步邏輯 ---
        window.uploadToCloud = async () => {
            const syncId = localStorage.getItem('sync_id');
            if(!syncId) return;
            const data = {
                deck: JSON.parse(localStorage.getItem('vocab_deck')) || [],
                mastered: JSON.parse(localStorage.getItem('mastered_list')) || [],
                stats: JSON.parse(localStorage.getItem('daily_stats')) || {}
            };
            try {
                await setDoc(doc(db, "users", syncId), data);
                console.log("數據已自動同步至雲端");
            } catch (e) { console.error("同步失敗:", e); }
        };

        window.downloadFromCloud = async () => {
            const syncId = localStorage.getItem('sync_id');
            if(!syncId) { alert("請先設定同步 ID"); return; }
            const docSnap = await getDoc(doc(db, "users", syncId));
            if (docSnap.exists()) {
                const cloudData = docSnap.data();
                localStorage.setItem('vocab_deck', JSON.stringify(cloudData.deck));
                localStorage.setItem('mastered_list', JSON.stringify(cloudData.mastered));
                localStorage.setItem('daily_stats', JSON.stringify(cloudData.stats));
                alert("雲端進度下載完成！網頁將重新載入。");
                location.reload();
            } else { alert("雲端找不到此 ID 的紀錄。"); }
        };
    </script>

    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary-text: #2c3e50;
            --secondary-text: #7f8c8d;
            --accent-color: #3498db;
            --cambridge-color: #d4001d;
            --again-color: #e74c3c;
            --hard-color: #e67e22;
            --good-color: #27ae60;
            --easy-color: #2980b9;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #app { width: 100%; max-width: 500px; text-align: center; }

        /* 雲端功能列 */
        .cloud-bar { display: flex; gap: 8px; margin-bottom: 15px; background: #fff; padding: 10px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .btn-cloud { flex: 1; background: #34495e; color: white; border: none; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; font-weight: bold; }
        
        .stats-bar { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; margin-bottom: 10px; color: var(--secondary-text); width: 100%; }
        .card { background: var(--card-bg); padding: 40px 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); min-height: 250px; display: flex; flex-direction: column; justify-content: center; cursor: pointer; position: relative; }
        .word-title { font-size: 2.5rem; font-weight: bold; }
        #answer-area { display: none; border-top: 1px solid #eee; margin-top: 20px; padding-top: 20px; }
        .button-group { display: none; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 25px; }
        .rate-btn { border: none; padding: 12px 5px; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .btn-again { background: var(--again-color); } .btn-hard { background: var(--hard-color); }
        .btn-good { background: var(--good-color); } .btn-easy { background: var(--easy-color); }
        
        .stats-dashboard { background: #fff; border-radius: 15px; padding: 15px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .stat-item { padding: 8px; border-radius: 8px; color: white; font-size: 0.75rem; }
        .stat-val { font-size: 1.1rem; font-weight: bold; display: block; }
        input[type="file"] { display: none; }
        .upload-label { color: var(--accent-color); text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <div class="cloud-bar">
        <button class="btn-cloud" onclick="setSyncID()">🔑 設定 ID</button>
        <button class="btn-cloud" onclick="downloadFromCloud()">📥 下載進度</button>
        <span id="id-display" style="font-size:0.7rem; align-self:center; color:#999;">尚未登入</span>
    </div>

    <div class="stats-bar">
        <span id="progress">剩餘: 0</span>
        <label class="upload-label" for="fileInput">追加 CSV</label>
        <input type="file" id="fileInput" accept=".csv">
    </div>

    <div class="card" id="mainCard" onclick="showAnswer()">
        <div id="card-front">
            <h2 class="word-title" id="displayWord">載入中...</h2>
            <button style="background:none; border:none; cursor:pointer; font-size:1.2rem;" onclick="event.stopPropagation(); reSpeak();">🔊</button>
        </div>
        <div id="answer-area">
            <div id="displayDefinition" style="font-weight:bold; font-size:1.2rem;"></div>
            <div id="displayExample" style="color:#7f8c8d; font-style:italic; font-size:0.9rem; margin-top:10px;"></div>
            <button style="background:none; border:none; cursor:pointer;" onclick="event.stopPropagation(); speakExample();">🔊 例句</button>
        </div>
    </div>

    <div class="button-group" id="controls">
        <button class="rate-btn btn-again" onclick="handleRate(1)">Again</button>
        <button class="rate-btn btn-hard" onclick="handleRate(2)">Hard</button>
        <button class="rate-btn btn-good" onclick="handleRate(3)">Good</button>
        <button class="rate-btn btn-easy" onclick="handleRate(4)">掌握</button>
    </div>

    <div class="stats-dashboard">
        <div class="stats-grid">
            <div class="stat-item btn-again"><span class="stat-val" id="count-again">0</span>忘記</div>
            <div class="stat-item btn-hard"><span class="stat-val" id="count-hard">0</span>模糊</div>
            <div class="stat-item btn-good"><span class="stat-val" id="count-good">0</span>熟悉</div>
            <div class="stat-item btn-easy"><span class="stat-val" id="count-easy">0</span>掌握</div>
        </div>
    </div>
</div>

<script>
    let deck = JSON.parse(localStorage.getItem('vocab_deck')) || [];
    let masteredList = JSON.parse(localStorage.getItem('mastered_list')) || [];
    let stats = JSON.parse(localStorage.getItem('daily_stats')) || { again:0, hard:0, good:0, easy:0 };
    let currentIndex = 0;

    function init() {
        const sid = localStorage.getItem('sync_id');
        if(sid) document.getElementById('id-display').innerText = "ID: " + sid;
        updateUI();
    }

    function updateUI() {
        if (deck.length === 0) { document.getElementById('displayWord').innerText = "已完成！"; return; }
        const item = deck[currentIndex];
        document.getElementById('displayWord').innerText = item.word;
        document.getElementById('displayDefinition').innerText = item.definition;
        document.getElementById('displayExample').innerText = item.example;
        document.getElementById('answer-area').style.display = 'none';
        document.getElementById('controls').style.display = 'none';
        document.getElementById('progress').innerText = "剩餘: " + deck.length;
        document.getElementById('count-again').innerText = stats.again;
        document.getElementById('count-hard').innerText = stats.hard;
        document.getElementById('count-good').innerText = stats.good;
        document.getElementById('count-easy').innerText = stats.easy;
        speak(item.word);
    }

    function showAnswer() { document.getElementById('answer-area').style.display = 'block'; document.getElementById('controls').style.display = 'grid'; }

    function handleRate(level) {
        const item = deck.splice(currentIndex, 1)[0];
        if (level === 1) { stats.again++; deck.splice(1, 0, item); }
        else if (level === 2) { stats.hard++; deck.splice(Math.floor(deck.length/2), 0, item); }
        else if (level === 3) { stats.good++; deck.push(item); }
        else if (level === 4) { stats.easy++; masteredList.push(item.word.toLowerCase()); }
        
        save();
        updateUI();
        // 每點擊一次評分，就自動同步到雲端一次
        if(window.uploadToCloud) window.uploadToCloud();
    }

    function save() {
        localStorage.setItem('vocab_deck', JSON.stringify(deck));
        localStorage.setItem('mastered_list', JSON.stringify(masteredList));
        localStorage.setItem('daily_stats', JSON.stringify(stats));
    }

    function setSyncID() {
        const id = prompt("請輸入您的專屬同步 ID (例如: lee0520)：");
        if(id) { localStorage.setItem('sync_id', id); location.reload(); }
    }

    function speak(t) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang = 'en-US'; window.speechSynthesis.speak(m); }
    function reSpeak() { speak(deck[currentIndex].word); }
    function speakExample() { speak(deck[currentIndex].example); }

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            const lines = event.target.result.split('\n');
            const newItems = lines.slice(1).map(l => {
                const p = l.split(',');
                if (p.length >= 2) return { word: p[0].trim(), definition: p[1].trim(), example: (p[2] || "").trim() };
            }).filter(i => i);
            const mSet = new Set(masteredList);
            deck = [...deck, ...newItems.filter(i => !mSet.has(i.word.toLowerCase()))];
            save(); init();
        };
        reader.readAsText(e.target.files[0]);
    });

    init();
</script>
</body>
</html>
